name: Test

on:
  workflow_dispatch:

jobs:
  build:
    runs-on:
      - ubuntu-latest
      - windows-latest
      
    permissions:
      actions: write
      contents: read
      
    steps:
    
    - name: Get BIN_DIR
      id: bin-dir
      shell: bash
      run: |
        if [ "$RUNNER_OS" == "Linux" ]; then
          bin_dir='${{ github.workspace }}/AssemblyLoader/bin/${{ matrix.BuildConfiguration }}'
        elif [ "$RUNNER_OS" == "Windows" ]; then
          bin_dir='${{ github.workspace }}\AssemblyLoader\bin\${{ matrix.BuildConfiguration }}'
        else
          echo "$RUNNER_OS not supported"
          exit 1
        fi
        echo "$bin_dir"
        echo "BIN_DIR=$bin_dir" >> $GITHUB_ENV
